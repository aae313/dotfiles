[main]
font=JetBrainsMono Nerd Font:size=14
terminal=footclient -e
layer=overlay
launch-prefix='app2unit --fuzzel-compat --'
prompt='>> '
width=60
lines=20
line-height=24
vertical-pad=8
horizontal-pad=14
inner-pad=8

[colors]
background=0a0a0acc
text=ff9999ff
match=ff00ffff
selection-match=ff00ffff
selection=4a2020ff
selection-text=ff00ffff
border=ff00ffff
[dmenu]
exit-immediately-if-empty=yes

[border]
width=2
radius=0
