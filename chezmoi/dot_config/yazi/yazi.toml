[mgr]
ratio = [1, 2, 2]
linemode = "none"
show_hidden = true
show_symlink = true
sort_by = "mtime"
sort_dir_first = true
sort_reverse = true
sort_sensitive = true

[preview]
tab_size = 2
max_width = 4000
max_height = 4000
cache_dir = ""
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]


[[plugin.prepend_fetchers]]
url = "*"
run = "git"
group = "git"

[[plugin.prepend_fetchers]]
url = "*/"
run = "git"
group = "git"
