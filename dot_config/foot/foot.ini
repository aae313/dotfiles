[main]
box-drawings-uses-font-glyphs=yes
app-id=foot
title=foot
locked-title=no
shell=/usr/bin/fish
font=JetBrainsMono Nerd Font:size=14

[cursor]
style=beam
beam-thickness=2

[key-bindings]
show-urls-launch=Control+Shift+u
unicode-input=Control+Shift+i

[colors-dark]
cursor=      16181a ffffff
foreground=cdd6f4
background= 16181a
foreground= ffffff
# The  eight basic ANSI colors (Black, Red, Green, Yellow, Blue, Magenta, Cyan, White)
regular0=   16181a
regular1=   ff6e5e
regular2=   5eff6c
regular3=   f1ff5e
regular4=   5ea1ff
regular5=   bd5eff
regular6=   5ef1ff
regular7=   ffffff
# The eight bright ANSI colors (Black, Red, Green, Yellow, Blue, Magenta, Cyan, White)
bright0=    3c4048
bright1=    ff6e5e
bright2=    5eff6c
bright3=    f1ff5e
bright4=    5ea1ff
bright5=    bd5eff
bright6=    5ef1ff
bright7=    ffffff
bright7=    ffffff
