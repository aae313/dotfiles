[main]
font=JetBrainsMono Nerd Font:size=14
terminal=footclient -e
layer=overlay
launch-prefix='app2unit --fuzzel-compat --'
prompt='>> '
width=60
lines=20
line-height=24
vertical-pad=8
horizontal-pad=14
inner-pad=8

[colors]
background=16161eff
text=c0caf5ff
match=2ac3deff
selection=343a55ff
selection-match=2ac3deff
selection-text=c0caf5ff
border=27a1b9ff

[dmenu]
exit-immediately-if-empty=yes

[border]
width=2
radius=18
