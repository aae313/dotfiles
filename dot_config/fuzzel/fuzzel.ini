[main]
font=JetBrainsMono Nerd Font:size=14
terminal=footclient -e
layer=overlay
launch-prefix='app2unit --fuzzel-compat --'
prompt='>> '
width=60
lines=20
line-height=24
vertical-pad=8
horizontal-pad=14
inner-pad=8

[colors]
background=161217ff
text=e9e0e8ff
selection=4b454dff
selection-text=cdc3ceff
border=4b454ddd
match=dfb8f6ff
selection-match=dfb8f6ff

[dmenu]
exit-immediately-if-empty=yes

[border]
width=2
radius=18
